server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reduce response buffering to avoid large in-flight packets behind VPN (MTU 1376)
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # API proxy to backend container
    location /workflow/ {
        proxy_pass http://backend:3000/workflow/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Swagger (optional dev access)
    location /swagger {
        proxy_pass http://backend:3000/swagger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # MFE bundles: no cache (filename fixed, not content-hashed)
    location ~* ^/(mfe-table|mfe-diagram)\.js$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Vite hashed assets: cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
